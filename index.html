  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    :root {
      --beige:        #f5f0e8;
      --beige-dark:   #ede6d6;
      --beige-card:   #faf7f2;
      --green:        #c8dfc8;
      --green-dark:   #a8c5a0;
      --green-accent: #5a8a5a;
      --black:        #1a1a1a;
      --gray:         #5c5c5c;
      --gray-light:   #9e9e9e;
      --white:        #ffffff;
      --shadow:       rgba(90,138,90,0.13);
      --shadow-lg:    rgba(90,138,90,0.22);
      --navbar-h:     58px;
      --bar-h:        64px;
      --r-sm:         8px;
      --r-md:         16px;
      --r-lg:         28px;
      --t:            0.2s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--beige);
      color: var(--black);
      min-height: 100vh;
      padding-top: var(--navbar-h);
      padding-bottom: var(--bar-h);
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--navbar-h);
      background: var(--white);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 100;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--black);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .back-btn {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 50px;
      border: 1.5px solid var(--green-dark);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t);
      flex-shrink: 0;
    }
    .back-btn.visible { display: flex; }
    .back-btn:hover { background: var(--green); }
    .back-btn .material-icons-round { font-size: 16px; }
    .page-label {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      display: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .page-label.visible { display: block; }

    /* BOTTOM BAR */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: var(--white);
      border-top: 1px solid var(--beige-dark);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      z-index: 100;
      box-shadow: 0 -2px 10px var(--shadow);
    }
    .search-wrap { flex: 1; position: relative; }
    #searchInput {
      width: 100%;
      padding: 11px 40px 11px 16px;
      border: 1.5px solid var(--green-dark);
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--beige);
      color: var(--black);
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    #searchInput:focus { border-color: var(--green-accent); box-shadow: 0 0 0 3px rgba(90,138,90,0.13); }
    #searchInput::placeholder { color: var(--gray-light); }
    .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--green-accent); pointer-events: none; }
    .search-icon .material-icons-round { font-size: 19px; }
    .search-results {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--white);
      border-radius: var(--r-md);
      box-shadow: 0 -4px 24px var(--shadow-lg);
      border: 1px solid var(--beige-dark);
      max-height: 260px;
      overflow-y: auto;
      display: none;
    }
    .search-results.active { display: block; }
    .sr-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; text-decoration: none; color: var(--black);
      font-size: 13px; border-bottom: 1px solid var(--beige); transition: background var(--t); gap: 8px;
    }
    .sr-item:last-child { border-bottom: none; }
    .sr-item:hover { background: var(--beige); }
    .sr-name { font-weight: 500; }
    .sr-cat { font-size: 11px; color: var(--green-accent); background: var(--green); padding: 2px 8px; border-radius: 50px; white-space: nowrap; }
    .bar-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1.5px solid var(--green-dark); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background var(--t);
      font-size: 19px; line-height: 1;
    }
    .bar-btn:hover { background: var(--green); }
    .bar-btn .material-icons-round { font-size: 19px; color: var(--green-accent); }

    /* PAGES */
    .page { display: none; }
    .page.active { display: block; }

    /* HOME */
    .hero { text-align: center; padding: 28px 20px 18px; }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(20px, 4vw, 34px);
      line-height: 1.2; margin-bottom: 8px;
    }
    .hero h1 em { color: var(--green-accent); font-style: italic; }
    .hero p { color: var(--gray); font-size: 14px; }
    .grid-wrap { max-width: 860px; margin: 0 auto; padding: 14px 16px 24px; }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .sec-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 20px 12px; background: var(--white);
      border-radius: var(--r-md); border: 1.5px solid var(--beige-dark);
      cursor: pointer; text-align: center; font-size: 13px; font-weight: 500;
      transition: box-shadow var(--t), border-color var(--t), transform var(--t);
      user-select: none;
    }
    .sec-card:hover { box-shadow: 0 4px 18px var(--shadow-lg); border-color: var(--green-accent); transform: translateY(-2px); }
    .sec-card .material-icons-round { font-size: 30px; color: var(--green-accent); }

    /* SECTION PAGE */
    .sec-page-inner { max-width: 960px; margin: 0 auto; padding: 20px 16px 28px; }
    .sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
    .subsec { background: var(--white); border-radius: var(--r-md); padding: 14px 16px; border: 1px solid var(--beige-dark); }
    .subsec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green-accent); margin-bottom: 10px; }
    .link-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .link-list a {
      display: flex; align-items: center; gap: 6px; padding: 6px 8px;
      border-radius: var(--r-sm); text-decoration: none; color: var(--black);
      font-size: 13px; transition: background var(--t);
    }
    .link-list a:hover { background: var(--green); }
    .link-list a .material-icons-round { font-size: 13px; color: var(--green-accent); opacity: 0.7; }

    /* ACCORDION */
    .accordion { display: flex; flex-direction: column; gap: 8px; }
    .acc-item { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--beige-dark); }
    .acc-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--beige-card); cursor: pointer;
      font-size: 13px; font-weight: 600; color: var(--green-accent);
      text-transform: uppercase; letter-spacing: 0.07em;
      transition: background var(--t); gap: 8px;
    }
    .acc-head:hover { background: var(--green); }
    .acc-head .material-icons-round { font-size: 16px; transition: transform var(--t); flex-shrink: 0; }
    .acc-item.open .acc-head .material-icons-round { transform: rotate(180deg); }
    .acc-body { display: none; padding: 10px 12px 14px; background: var(--white); }
    .acc-item.open .acc-body { display: block; }

    /* FUN PAGE */
    .fun-sec-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--green-accent); margin: 18px 0 8px 2px;
    }
    .fun-sec-title:first-child { margin-top: 0; }
    .fun-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 4px; }
    .fun-link {
      display: flex; align-items: center; gap: 7px; padding: 10px 12px;
      border-radius: var(--r-sm); background: var(--white); border: 1px solid var(--beige-dark);
      text-decoration: none; color: var(--black); font-size: 13px;
      transition: background var(--t), border-color var(--t);
    }
    .fun-link:hover { background: var(--green); border-color: var(--green-accent); }
    .fun-link .material-icons-round { font-size: 14px; color: var(--green-accent); flex-shrink: 0; }

    /* POPUP */
    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(26,26,26,0.4); z-index: 200;
      align-items: center; justify-content: center; padding: 20px;
    }
    .popup-overlay.active { display: flex; }
    .popup-card {
      background: var(--white); border-radius: var(--r-lg); padding: 26px;
      max-width: 460px; width: 100%; max-height: 78vh; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18); animation: popIn 0.2s ease;
    }
    @keyframes popIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
    .popup-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 14px; }
    .popup-body { font-size: 13px; color: var(--gray); line-height: 1.6; }
    .popup-close {
      margin-top: 18px; padding: 10px 22px; border-radius: 50px; border: none;
      background: var(--green); color: var(--black); font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .popup-close:hover { background: var(--green-dark); }
    .popup-list { list-style: none; margin-top: 8px; }
    .popup-list li { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--beige); font-size: 13px; }
    .popup-list li:last-child { border-bottom: none; }
    .err { color: #e53935; }
    .popup-list .material-icons-round { font-size: 15px; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .sub-grid { grid-template-columns: 1fr; }
      .fun-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

// ── SEARCH INDEX (deduped) ──
const searchIndex = [];
const seenUrls = new Set();
function indexLinks(links, cat) {
  links.forEach(l => {
    const key = l.u.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'').toLowerCase();
    if (seenUrls.has(key)) return;
    seenUrls.add(key);
    searchIndex.push({n:l.n, u:l.u, cat});
  });
}
SECTIONS.forEach(s => s.sub.forEach(sub => indexLinks(sub.links, s.label)));
FUN_SECTIONS.forEach(fs => indexLinks(fs.links, 'Svago'));

// ── BUILD HOME GRID ──
const homeGrid = document.getElementById('homeGrid');
SECTIONS.forEach(sec => {
  const card = document.createElement('div');
  card.className = 'sec-card';
  card.innerHTML = '<span class="material-icons-round">'+sec.icon+'</span>'+sec.label;
  card.addEventListener('click', () => showPage(sec.id));
  homeGrid.appendChild(card);
});

// ── BUILD SECTION PAGES ──
const sectionPages = document.getElementById('sectionPages');
SECTIONS.forEach(sec => {
  const page = document.createElement('div');
  page.className = 'page';
  page.id = 'page-' + sec.id;
  const inner = document.createElement('div');
  inner.className = 'sec-page-inner';

  if (sec.isArchive) {
    const acc = document.createElement('div');
    acc.className = 'accordion';
    sec.sub.forEach(sub => {
      const item = document.createElement('div');
      item.className = 'acc-item';
      const head = document.createElement('div');
      head.className = 'acc-head';
      head.innerHTML = '<span>'+sub.title+'</span><span class="material-icons-round">expand_more</span>';
      const body = document.createElement('div');
      body.className = 'acc-body';
      const ul = document.createElement('ul');
      ul.className = 'link-list';
      sub.links.forEach(l => {
        const li = document.createElement('li');
        li.innerHTML = '<a href="'+l.u+'" target="_blank" rel="noopener"><span class="material-icons-round">open_in_new</span>'+l.n+'</a>';
        ul.appendChild(li);
      });
      body.appendChild(ul);
      item.appendChild(head);
      item.appendChild(body);
      head.addEventListener('click', () => item.classList.toggle('open'));
      acc.appendChild(item);
    });
    inner.appendChild(acc);
  } else {
    const grid = document.createElement('div');
    grid.className = 'sub-grid';
    sec.sub.forEach(sub => {
      const box = document.createElement('div');
      box.className = 'subsec';
      const t = document.createElement('div');
      t.className = 'subsec-title';
      t.textContent = sub.title;
      box.appendChild(t);
      const ul = document.createElement('ul');
      ul.className = 'link-list';
      sub.links.forEach(l => {
        const li = document.createElement('li');
        li.innerHTML = '<a href="'+l.u+'" target="_blank" rel="noopener"><span class="material-icons-round">open_in_new</span>'+l.n+'</a>';
        ul.appendChild(li);
      });
      box.appendChild(ul);
      grid.appendChild(box);
    });
    inner.appendChild(grid);
  }
  page.appendChild(inner);
  sectionPages.appendChild(page);
});

// ── BUILD FUN PAGE ──
const funContent = document.getElementById('funContent');
FUN_SECTIONS.forEach(fs => {
  const t = document.createElement('div');
  t.className = 'fun-sec-title';
  t.textContent = fs.title;
  funContent.appendChild(t);
  const grid = document.createElement('div');
  grid.className = 'fun-grid';
  fs.links.forEach(l => {
    const a = document.createElement('a');
    a.className = 'fun-link';
    a.href = l.u;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = '<span class="material-icons-round">open_in_new</span>'+l.n;
    grid.appendChild(a);
  });
  funContent.appendChild(grid);
});

// ── NAVIGATION ──
const backBtn = document.getElementById('backBtn');
const pageLabel = document.getElementById('pageLabel');

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'home') {
    backBtn.classList.remove('visible');
    pageLabel.classList.remove('visible');
  } else {
    backBtn.classList.add('visible');
    pageLabel.classList.add('visible');
    if (id === 'fun') {
      pageLabel.textContent = '🎮 Svago';
    } else {
      const sec = SECTIONS.find(s => s.id === id);
      pageLabel.textContent = sec ? sec.label : '';
    }
  }
}

backBtn.addEventListener('click', () => showPage('home'));
document.getElementById('funBtn').addEventListener('click', () => showPage('fun'));

// ── SEARCH ──
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  searchResults.innerHTML = '';
  if (!q) { searchResults.classList.remove('active'); return; }
  const matches = searchIndex.filter(item =>
    item.n.toLowerCase().includes(q) || item.u.toLowerCase().includes(q)
  ).slice(0, 20);
  if (!matches.length) { searchResults.classList.remove('active'); return; }
  matches.forEach(item => {
    const a = document.createElement('a');
    a.className = 'sr-item';
    a.href = item.u;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = '<span class="sr-name">'+item.n+'</span><span class="sr-cat">'+item.cat+'</span>';
    searchResults.appendChild(a);
  });
  searchResults.classList.add('active');
});

document.addEventListener('click', e => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.classList.remove('active');
    searchInput.value = '';
  }
});

// ── CHECK SITES ──
const popupOverlay = document.getElementById('popupOverlay');
const popupTitle = document.getElementById('popupTitle');
const popupBody = document.getElementById('popupBody');
document.getElementById('popupClose').addEventListener('click', () => popupOverlay.classList.remove('active'));
popupOverlay.addEventListener('click', e => { if (e.target === popupOverlay) popupOverlay.classList.remove('active'); });

document.getElementById('checkBtn').addEventListener('click', async () => {
  popupTitle.textContent = 'Verifica in corso…';
  popupBody.innerHTML = '<p id="prog" style="color:#9e9e9e;font-size:13px">Avvio…</p>';
  popupOverlay.classList.add('active');
  let done = 0;
  const total = searchIndex.length;
  const results = await Promise.allSettled(
    searchIndex.map(item =>
      fetch(item.u, {method:'HEAD', mode:'no-cors', cache:'no-cache', signal:AbortSignal.timeout(6000)})
        .then(() => { done++; const p=document.getElementById('prog'); if(p) p.textContent='Controllo '+done+'/'+total+'…'; return {item, ok:true}; })
        .catch(() => { done++; const p=document.getElementById('prog'); if(p) p.textContent='Controllo '+done+'/'+total+'…'; return {item, ok:false}; })
    )
  );
  const all = results.map(r => r.value);
  const failed = all.filter(r => !r.ok);
  const okCount = all.filter(r => r.ok).length;
  popupTitle.textContent = 'Verifica completata';
  if (!failed.length) {
    popupBody.innerHTML = '<p style="color:#5a8a5a;font-weight:600;font-size:15px">Tutti i '+okCount+' siti risultano raggiungibili!</p><p style="margin-top:8px;font-size:12px;color:#9e9e9e">Nota: alcuni siti con restrizioni CORS rispondono ok anche offline.</p>';
  } else {
    const list = failed.map(r => '<li><span class="material-icons-round err">error</span><span style="flex:1">'+r.item.n+'</span><span style="font-size:11px;color:#9e9e9e">'+r.item.cat+'</span></li>').join('');
    popupBody.innerHTML = '<p style="margin-bottom:10px;font-size:13px;color:#5c5c5c"><b>'+okCount+'</b> ok &nbsp;·&nbsp; <b>'+failed.length+'</b> non raggiungibili:</p><ul class="popup-list">'+list+'</ul><p style="margin-top:10px;font-size:11px;color:#9e9e9e">Alcuni siti possono bloccare controlli automatici pur essendo online.</p>';
  }
});
</script>
</body>
</html>
