<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeriko's House Tools</title>
  <link rel="icon" href="https://cdn2.iconfinder.com/data/icons/halloween-creeps-silhouettes/100/raven-512.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    :root {
      --md-beige:        #f5f0e8;
      --md-beige-dark:   #ede6d6;
      --md-beige-card:   #faf7f2;
      --md-green:        #c8dfc8;
      --md-green-dark:   #a8c5a0;
      --md-green-accent: #5a8a5a;
      --md-black:        #1a1a1a;
      --md-gray:         #5c5c5c;
      --md-gray-light:   #9e9e9e;
      --md-white:        #ffffff;
      --md-shadow:       rgba(90,138,90,0.12);
      --md-shadow-lg:    rgba(90,138,90,0.2);
      --navbar-h:        64px;
      --searchbar-h:     68px;
      --radius-sm:       8px;
      --radius-md:       16px;
      --radius-lg:       28px;
      --transition:      0.22s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--md-beige);
      color: var(--md-black);
      min-height: 100vh;
      padding-top: var(--navbar-h);
      padding-bottom: var(--searchbar-h);
    }

    /* ─── NAVBAR ─── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--navbar-h);
      background: var(--md-white);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      box-shadow: 0 2px 8px var(--md-shadow);
      z-index: 900;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      color: var(--md-black);
      white-space: nowrap;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .logo span { color: var(--md-green-accent); }

    /* nav pills scroll container */
    .nav-scroll {
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .nav-scroll::-webkit-scrollbar { display: none; }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 7px 14px;
      border-radius: 50px;
      border: 1.5px solid var(--md-green-dark);
      background: transparent;
      color: var(--md-black);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), color var(--transition), border-color var(--transition), box-shadow var(--transition);
      position: relative;
      flex-shrink: 0;
    }
    .nav-pill .material-icons-round { font-size: 16px; }
    .nav-pill:hover, .nav-pill.active {
      background: var(--md-green);
      border-color: var(--md-green-accent);
      box-shadow: 0 2px 8px var(--md-shadow);
    }
    .nav-pill .pill-arrow {
      font-size: 14px;
      transition: transform var(--transition);
    }
    .nav-pill.active .pill-arrow { transform: rotate(180deg); }

    /* special fun pill */
    .nav-pill.fun-pill {
      background: var(--md-green);
      border-color: var(--md-green-accent);
    }
    .nav-pill.fun-pill:hover {
      background: var(--md-green-accent);
      color: var(--md-white);
    }

    /* burger */
    .burger-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .burger-btn:hover { background: var(--md-beige); }
    .burger-btn .line {
      width: 22px; height: 2px;
      background: var(--md-black);
      border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }
    .burger-btn.active .line:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .burger-btn.active .line:nth-child(2) { opacity: 0; }
    .burger-btn.active .line:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    /* mobile menu overlay */
    .mobile-menu {
      display: none;
      position: fixed;
      top: var(--navbar-h); left: 0; right: 0; bottom: var(--searchbar-h);
      background: var(--md-white);
      z-index: 800;
      overflow-y: auto;
      padding: 16px;
    }
    .mobile-menu.active { display: block; }
    .mobile-nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
      gap: 8px;
    }
    .mobile-nav-item:hover { background: var(--md-beige); }
    .mobile-nav-item .material-icons-round { font-size: 18px; color: var(--md-green-accent); }

    /* ─── DROPDOWN PANEL ─── */
    .dropdown-overlay {
      display: none;
      position: fixed;
      top: var(--navbar-h); left: 0; right: 0;
      background: rgba(26,26,26,0.18);
      z-index: 700;
      backdrop-filter: blur(2px);
    }
    .dropdown-overlay.active { display: block; }

    .dropdown-panel {
      display: none;
      position: fixed;
      top: var(--navbar-h);
      left: 0; right: 0;
      background: var(--md-white);
      z-index: 750;
      box-shadow: 0 8px 32px var(--md-shadow-lg);
      border-bottom-left-radius: var(--radius-lg);
      border-bottom-right-radius: var(--radius-lg);
      overflow: hidden;
      max-height: calc(100vh - var(--navbar-h) - var(--searchbar-h) - 8px);
      animation: panelSlide 0.22s cubic-bezier(.4,0,.2,1);
    }
    .dropdown-panel.active { display: flex; flex-direction: column; }

    @keyframes panelSlide {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-inner {
      overflow-y: auto;
      padding: 20px 24px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--md-green-dark) transparent;
    }

    .panel-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--md-black);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--md-green);
    }

    /* subsections in panel */
    .panel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .subsection {
      background: var(--md-beige-card);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      border: 1px solid var(--md-beige-dark);
    }
    .subsection-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--md-green-accent);
      margin-bottom: 10px;
    }
    .link-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .link-list a {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--md-black);
      font-size: 13px;
      font-weight: 400;
      transition: background var(--transition), color var(--transition);
    }
    .link-list a:hover {
      background: var(--md-green);
      color: var(--md-black);
    }
    .link-list a .material-icons-round { font-size: 13px; color: var(--md-green-accent); opacity: 0.7; }

    /* ─── ARCHIVE ACCORDION ─── */
    .archive-accordion {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .acc-item { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--md-beige-dark); }
    .acc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--md-beige-card);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--md-green-accent);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      transition: background var(--transition);
      gap: 8px;
    }
    .acc-header:hover { background: var(--md-green); }
    .acc-header .material-icons-round { font-size: 16px; transition: transform var(--transition); }
    .acc-item.open .acc-header .material-icons-round { transform: rotate(180deg); }
    .acc-body {
      display: none;
      padding: 10px 12px 14px;
      background: var(--md-white);
    }
    .acc-item.open .acc-body { display: block; }

    /* ─── MAIN CONTENT ─── */
    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 20px;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 32px;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 5vw, 52px);
      color: var(--md-black);
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .hero h1 em { color: var(--md-green-accent); font-style: italic; }
    .hero p {
      color: var(--md-gray);
      font-size: 15px;
      max-width: 500px;
      margin: 0 auto;
    }

    /* quick access cards */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin: 0 auto;
      max-width: 900px;
    }
    .quick-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      background: var(--md-white);
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--md-black);
      font-size: 13px;
      font-weight: 500;
      border: 1.5px solid var(--md-beige-dark);
      cursor: pointer;
      transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
      text-align: center;
    }
    .quick-card:hover {
      box-shadow: 0 4px 18px var(--md-shadow-lg);
      border-color: var(--md-green-accent);
      transform: translateY(-2px);
    }
    .quick-card .material-icons-round {
      font-size: 28px;
      color: var(--md-green-accent);
    }

    /* ─── FUN PAGE ─── */
    .fun-page {
      display: none;
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 20px;
    }
    .fun-page.active { display: block; }
    .fun-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .fun-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--md-green-dark);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }
    .fun-back:hover { background: var(--md-green); }
    .fun-back .material-icons-round { font-size: 16px; }
    .fun-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
    }

    .fun-sections { display: flex; flex-direction: column; gap: 24px; }
    .fun-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--md-green-accent);
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .fun-links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 8px;
    }
    .fun-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: var(--md-white);
      border: 1px solid var(--md-beige-dark);
      text-decoration: none;
      color: var(--md-black);
      font-size: 13px;
      transition: background var(--transition), border-color var(--transition);
    }
    .fun-link:hover {
      background: var(--md-green);
      border-color: var(--md-green-accent);
    }
    .fun-link .material-icons-round { font-size: 15px; color: var(--md-green-accent); }

    /* ─── SEARCH BAR ─── */
    .search-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--searchbar-h);
      background: var(--md-white);
      border-top: 1px solid var(--md-beige-dark);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 900;
      box-shadow: 0 -2px 12px var(--md-shadow);
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    #categorySearch {
      width: 100%;
      padding: 12px 44px 12px 18px;
      border: 1.5px solid var(--md-green-dark);
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--md-beige);
      color: var(--md-black);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    #categorySearch:focus {
      border-color: var(--md-green-accent);
      box-shadow: 0 0 0 3px rgba(90,138,90,0.15);
    }
    #categorySearch::placeholder { color: var(--md-gray-light); }
    .search-icon-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--md-green-accent);
      pointer-events: none;
    }
    .search-icon-btn .material-icons-round { font-size: 20px; }

    .search-results {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--md-white);
      border-radius: var(--radius-md);
      box-shadow: 0 -4px 24px var(--md-shadow-lg);
      border: 1px solid var(--md-beige-dark);
      max-height: 280px;
      overflow-y: auto;
      display: none;
      scrollbar-width: thin;
    }
    .search-results.active { display: block; }
    .search-result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      text-decoration: none;
      color: var(--md-black);
      font-size: 13px;
      border-bottom: 1px solid var(--md-beige);
      transition: background var(--transition);
      gap: 8px;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--md-beige); }
    .search-result-item .result-name { font-weight: 500; }
    .search-result-item .result-cat {
      font-size: 11px;
      color: var(--md-green-accent);
      background: var(--md-green);
      padding: 2px 8px;
      border-radius: 50px;
      white-space: nowrap;
    }

    /* check button */
    .check-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 50px;
      border: 1.5px solid var(--md-green-dark);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
    }
    .check-btn .material-icons-round { font-size: 16px; }
    .check-btn:hover { background: var(--md-green); }

    /* ─── POPUP ─── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.4);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .popup-overlay.active { display: flex; }
    .popup-card {
      background: var(--md-white);
      border-radius: var(--radius-lg);
      padding: 28px;
      max-width: 480px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      animation: popIn 0.25s cubic-bezier(.4,0,.2,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }
    .popup-title {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      margin-bottom: 16px;
      color: var(--md-black);
    }
    .popup-body { font-size: 14px; color: var(--md-gray); line-height: 1.6; }
    .popup-close {
      margin-top: 20px;
      padding: 10px 24px;
      border-radius: 50px;
      border: none;
      background: var(--md-green);
      color: var(--md-black);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition);
    }
    .popup-close:hover { background: var(--md-green-dark); }
    .popup-list { list-style: none; margin-top: 8px; }
    .popup-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--md-beige);
      font-size: 13px;
    }
    .popup-list li:last-child { border-bottom: none; }
    .popup-list .ok { color: #4caf50; }
    .popup-list .err { color: #e53935; }
    .popup-list .material-icons-round { font-size: 16px; }
    .check-progress {
      font-size: 13px;
      color: var(--md-gray-light);
      margin-top: 6px;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      :root { --navbar-h: 60px; }
      .nav-scroll { display: none; }
      .burger-btn { display: flex; }
      .logo { font-size: 17px; }
      .panel-grid { grid-template-columns: 1fr 1fr; }
      .quick-grid { grid-template-columns: repeat(3, 1fr); }
      .check-btn span { display: none; }
    }
    @media (max-width: 480px) {
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
      .panel-grid { grid-template-columns: 1fr; }
      .fun-links-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     NAVBAR
═══════════════════════════════════════════ -->
<nav class="navbar">
  <div class="logo">Jeriko's <span>🐦‍⬛</span> tools</div>

  <div class="nav-scroll" id="navScroll">
    <!-- pills injected by JS -->
  </div>

  <div class="burger-btn" id="burgerBtn">
    <div class="line"></div>
    <div class="line"></div>
    <div class="line"></div>
  </div>
</nav>

<!-- mobile menu -->
<div class="mobile-menu" id="mobileMenu"></div>

<!-- dropdown overlay -->
<div class="dropdown-overlay" id="dropdownOverlay"></div>

<!-- dropdown panel -->
<div class="dropdown-panel" id="dropdownPanel">
  <div class="panel-inner" id="panelInner"></div>
</div>

<!-- ═══════════════════════════════════════════
     MAIN
═══════════════════════════════════════════ -->
<div id="homePage">
  <div class="hero">
    <h1>Il tuo hub di<br><em>link utili</em></h1>
    <p>Tutti i siti che usi ogni giorno, organizzati in un solo posto.</p>
  </div>
  <div class="main-content">
    <div class="quick-grid" id="quickGrid"></div>
  </div>
</div>

<!-- fun page -->
<div class="fun-page" id="funPage">
  <div class="fun-header">
    <button class="fun-back" id="funBack">
      <span class="material-icons-round">arrow_back</span>
      Home
    </button>
    <div class="fun-title">🎮 Svago</div>
  </div>
  <div class="fun-sections" id="funSections"></div>
</div>

<!-- ═══════════════════════════════════════════
     SEARCH BAR
═══════════════════════════════════════════ -->
<div class="search-bar">
  <div class="search-wrap">
    <input type="text" id="categorySearch" placeholder="Cerca un sito…" autocomplete="off">
    <div class="search-icon-btn"><span class="material-icons-round">search</span></div>
    <div class="search-results" id="searchResults"></div>
  </div>
  <button class="check-btn" id="checkBtn">
    <span class="material-icons-round">wifi_tethering</span>
    <span>Verifica siti</span>
  </button>
</div>

<!-- popup -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup-card">
    <div class="popup-title" id="popupTitle">Verifica siti</div>
    <div class="popup-body" id="popupBody"></div>
    <button class="popup-close" id="popupClose">Chiudi</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     DATA + LOGIC
═══════════════════════════════════════════ -->
<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const SECTIONS = [
  {
    id: 'tools',
    label: 'Tools',
    icon: 'build_circle',
    sub: [
      { title: 'Utilità generali', links: [
        { n:'Virustotal',       u:'https://virustotal.com' },
        { n:'Snapdrop',         u:'https://onedoes.github.io/snapdrop/' },
        { n:'Dictation',        u:'https://dictation.io/speech' },
        { n:'Copychar',         u:'https://copychar.cc/' },

        { n:'Downdetector',     u:'https://downdetector.it/' },

      ]},
      { title: 'Trasferimento file', links: [
        { n:'SwissTransfer', u:'https://www.swisstransfer.com/it-it' },

let activePanel = null;

function buildPanelContent(sec) {
  const inner = document.getElementById('panelInner');
  inner.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'panel-title';
  title.textContent = sec.label;
  inner.appendChild(title);

  if (sec.isArchive) {
    // accordion layout
    const acc = document.createElement('div');
    acc.className = 'archive-accordion';
    sec.sub.forEach(subsec => {
      const item = document.createElement('div');
      item.className = 'acc-item';
      item.innerHTML = `<div class="acc-header">${subsec.title}<span class="material-icons-round">expand_more</span></div><div class="acc-body"></div>`;
      const body = item.querySelector('.acc-body');
      const ul = document.createElement('ul');
      ul.className = 'link-list';
      subsec.links.forEach(link => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${link.u}" target="_blank" rel="noopener"><span class="material-icons-round">open_in_new</span>${link.n}</a>`;
        ul.appendChild(li);
      });
      body.appendChild(ul);
      item.querySelector('.acc-header').addEventListener('click', () => item.classList.toggle('open'));
      acc.appendChild(item);
    });
    inner.appendChild(acc);
  } else {
    // grid layout
    const grid = document.createElement('div');
    grid.className = 'panel-grid';
    sec.sub.forEach(subsec => {
      const sub = document.createElement('div');
      sub.className = 'subsection';
      const stitle = document.createElement('div');
      stitle.className = 'subsection-title';
      stitle.textContent = subsec.title;
      sub.appendChild(stitle);
      const ul = document.createElement('ul');
      ul.className = 'link-list';
      subsec.links.forEach(link => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${link.u}" target="_blank" rel="noopener"><span class="material-icons-round">open_in_new</span>${link.n}</a>`;
        ul.appendChild(li);
      });
      sub.appendChild(ul);
      grid.appendChild(sub);
    });
    inner.appendChild(grid);
  }
}

function togglePanel(id) {
  if (activePanel === id) { closePanel(); return; }
  const sec = SECTIONS.find(s => s.id === id);
  if (!sec) return;
  buildPanelContent(sec);
  activePanel = id;
  document.getElementById('dropdownPanel').classList.add('active');
  document.getElementById('dropdownOverlay').classList.add('active');
  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
  const pill = document.querySelector(`.nav-pill[data-id="${id}"]`);
  if (pill) pill.classList.add('active');
}

function closePanel() {
  activePanel = null;
  document.getElementById('dropdownPanel').classList.remove('active');
  document.getElementById('dropdownOverlay').classList.remove('active');
  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
}

document.getElementById('dropdownOverlay').addEventListener('click', closePanel);

// ─────────────────────────────────────────────
// SEARCH — no duplicates
// ─────────────────────────────────────────────
// Build a flat deduplicated index
const searchIndex = [];
const seenUrls = new Set();

function addToIndex(links, category) {
  links.forEach(link => {
    const clean = link.u.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'').toLowerCase();
    if (seenUrls.has(clean)) return;
    seenUrls.add(clean);
    searchIndex.push({ n: link.n, u: link.u, cat: category });
  });
}

SECTIONS.forEach(sec => {
  sec.sub.forEach(sub => addToIndex(sub.links, sec.label));
});
FUN_SECTIONS.forEach(fsec => {
  addToIndex(fsec.links, 'Svago');
});

const searchInput = document.getElementById('categorySearch');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  searchResults.innerHTML = '';
  if (!q) { searchResults.classList.remove('active'); return; }
  const matches = searchIndex.filter(item =>
    item.n.toLowerCase().includes(q) || item.u.toLowerCase().includes(q)
  ).slice(0, 20);
  if (matches.length === 0) {
    searchResults.classList.remove('active');
    return;
  }
  matches.forEach(item => {
    const a = document.createElement('a');
    a.className = 'search-result-item';
    a.href = item.u;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = `<span class="result-name">${item.n}</span><span class="result-cat">${item.cat}</span>`;
    searchResults.appendChild(a);
  });
  searchResults.classList.add('active');
});

document.addEventListener('click', (e) => {
  if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
    searchResults.classList.remove('active');
  }
});

// ─────────────────────────────────────────────
// CHECK SITES
// ─────────────────────────────────────────────
const checkBtn = document.getElementById('checkBtn');
const popupOverlay = document.getElementById('popupOverlay');
const popupTitle = document.getElementById('popupTitle');
const popupBody = document.getElementById('popupBody');
const popupClose = document.getElementById('popupClose');

popupClose.addEventListener('click', () => popupOverlay.classList.remove('active'));
popupOverlay.addEventListener('click', (e) => { if (e.target === popupOverlay) popupOverlay.classList.remove('active'); });

checkBtn.addEventListener('click', async () => {
  popupTitle.textContent = 'Verifica siti in corso…';
  popupBody.innerHTML = '<div class="check-progress">Controllo in corso, potrebbe richiedere qualche secondo…</div>';
  popupOverlay.classList.add('active');

  // sample a subset to keep it fast (first link of each subsection)
  const toCheck = [];
  const seen = new Set();
  SECTIONS.forEach(sec => {
    sec.sub.forEach(sub => {
      if (sub.links.length > 0) {
        const l = sub.links[0];
        if (!seen.has(l.u)) { seen.add(l.u); toCheck.push(l); }
      }
    });
  });

  const results = await Promise.allSettled(
    toCheck.map(link =>
      fetch(link.u, { method: 'HEAD', mode: 'no-cors', cache: 'no-cache', signal: AbortSignal.timeout(5000) })
        .then(() => ({ link, ok: true }))
        .catch(() => ({ link, ok: false }))
    )
  );

  const failed = results
    .map(r => r.value || r.reason)
    .filter(r => r && !r.ok);

  popupTitle.textContent = 'Risultato verifica';
  if (failed.length === 0) {
    popupBody.innerHTML = '<p style="color:var(--md-green-accent);font-weight:600;font-size:15px">✅ Tutti i siti controllati risultano raggiungibili!</p><p style="margin-top:8px;font-size:13px;color:var(--md-gray)">Nota: alcuni siti con restrizioni CORS potrebbero non rispondere al controllo pur essendo online.</p>';
  } else {
    const list = failed.map(r => `<li><span class="material-icons-round err">error</span>${r.link ? r.link.n : '?'}</li>`).join('');
    popupBody.innerHTML = `<p style="margin-bottom:10px;font-size:13px;color:var(--md-gray)">I seguenti siti non hanno risposto (potrebbero essere offline o bloccare i controlli automatici):</p><ul class="popup-list">${list}</ul>`;
  }
});
</script>
